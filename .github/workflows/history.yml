name: Gemini History Updater
on:
  push:
    branches: ['main']
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'postcss.config.js'
      - 'index.html'
      - 'tsconfig*.json'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
      - run: npm install --no-save @google/generative-ai
      - run: node scripts/generate-history.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
      - name: Commit & Push
        run: |
          git config --local user.name "Gemini-Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/HISTORY.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: auto-update history by Gemini [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
